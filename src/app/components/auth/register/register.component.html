<div class="register-container">
  <h2>Register</h2>

  <form (ngSubmit)="onSubmit()">
    <div>
      <label>First Name</label>
      <input type="text" [(ngModel)]="request.firstName" name="firstName" required />
    </div>

    <div>
      <label>Last Name</label>
      <input type="text" [(ngModel)]="request.lastName" name="lastName" required />
    </div>

    <div>
      <label>DNI</label>
      <input type="text" [(ngModel)]="request.dni" name="dni" required />
    </div>

    <div>
      <label>Email</label>
      <input type="email" [(ngModel)]="request.email" name="email" required />
    </div>

    <div>
      <label>Password</label>
      <input type="password" [(ngModel)]="request.password" name="password" required />
    </div>

    <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>

    <button type="submit" [disabled]="loading">
      {{ loading ? 'Loading...' : 'Register' }}
    </button>
  </form>

  <p>Already have an account? <a routerLink="/login">Login</a></p>
</div>
